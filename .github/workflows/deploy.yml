name: Deploy game to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Export Web build
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.7
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates
          mv /root/.local/share/godot/export_templates/* ~/.local/share/godot/export_templates/

      - name: Export "Web" preset
        run: |
          mkdir -p build/web
          cd godottowerdefense
          godot --headless --export-release "Web" "$GITHUB_WORKSPACE/build/web/index.html"

      - name: Enable cross-origin isolation (GitHub Pages can't set the headers)
        run: |
          curl -sSL -o build/web/coi-serviceworker.js \
            https://raw.githubusercontent.com/gzuidhof/coi-serviceworker/master/coi-serviceworker.min.js
          sed -i 's#</title>#</title><script src="coi-serviceworker.js"></script>#' build/web/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
