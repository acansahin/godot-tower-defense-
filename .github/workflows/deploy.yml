name: Deploy game to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Export Web build
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.7
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates
          mv /root/.local/share/godot/export_templates/* ~/.local/share/godot/export_templates/

      - name: Export "Web" preset
        run: |
          mkdir -p build/web
          cd godottowerdefense
          godot --headless --export-release "Web" "$GITHUB_WORKSPACE/build/web/index.html"
          # Pages serves index.html by default; the single-threaded (nothreads)
          # export needs no cross-origin isolation headers.

      - name: Add web extras
        run: |
          # The preset's html/head_include pulls in orientation.js with a relative path,
          # so it has to sit next to index.html. It is not a Godot resource, so the
          # export itself never copies it.
          cp godottowerdefense/web/orientation.js build/web/
          test -s build/web/orientation.js

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
