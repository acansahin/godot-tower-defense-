name: Build Android APK

# Exports a debug .apk you can sideload onto an Android device. Runs in the same
# barichello/godot-ci:4.7 container as the Web deploy — that image already ships
# the Android SDK and the Godot export templates. We generate our own debug
# keystore and hand it to Godot via the GODOT_ANDROID_KEYSTORE_DEBUG_* env vars
# (more robust than relying on the image's baked-in one).
#
# Two ways to get the APK:
#   * push to main  -> build artifact on the run (expires, needs a GitHub login)
#   * push a v* tag -> the same APK attached to a GitHub Release, which is
#                      permanent and downloadable by anyone without signing in.
# Cut a release with:  git tag v1.0 && git push origin v1.0

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build-android:
    name: Export Android (debug APK)
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.7
    env:
      GODOT_ANDROID_KEYSTORE_DEBUG_PATH: ${{ github.workspace }}/debug.keystore
      GODOT_ANDROID_KEYSTORE_DEBUG_USER: androiddebugkey
      GODOT_ANDROID_KEYSTORE_DEBUG_PASSWORD: android
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up export templates + Android config
        run: |
          # GitHub Actions sets HOME to /github/home, so move the image's
          # templates and its pre-configured Android SDK path (under
          # /root/.config/godot) into place where Godot will look.
          mkdir -p ~/.local/share/godot/export_templates
          mv /root/.local/share/godot/export_templates/* ~/.local/share/godot/export_templates/
          mkdir -p ~/.config
          mv /root/.config/godot ~/.config/godot

      - name: Generate debug keystore
        run: |
          keytool -keyalg RSA -genkeypair -alias androiddebugkey \
            -keypass android -keystore "$GITHUB_WORKSPACE/debug.keystore" \
            -storepass android -dname "CN=Android Debug,O=Android,C=US" \
            -validity 9999 -deststoretype pkcs12

      - name: Stamp version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          # Without this every build reports itself as 1.0. versionCode must also
          # increase for Android to treat a build as an update, so use the run number.
          VER="${GITHUB_REF_NAME#v}"
          sed -i "s|^version/name=.*|version/name=\"$VER\"|" godottowerdefense/export_presets.cfg
          sed -i "s|^version/code=.*|version/code=${{ github.run_number }}|" godottowerdefense/export_presets.cfg
          grep -E '^version/' godottowerdefense/export_presets.cfg

      - name: Export "Android" preset (debug APK)
        run: |
          mkdir -p build/android
          cd godottowerdefense
          godot --headless --verbose --export-debug "Android" "$GITHUB_WORKSPACE/build/android/element-td.apk"
          ls -lh "$GITHUB_WORKSPACE/build/android/element-td.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: element-td-android-apk
          path: build/android/element-td.apk
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build-android
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest        # no container: keeps the release actions on the stock runner
    permissions:
      contents: write             # required to create the release
    steps:
      - name: Download the built APK
        uses: actions/download-artifact@v4
        with:
          name: element-td-android-apk
          path: dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/element-td.apk
          generate_release_notes: true
          body: |
            **Element TD** — Android build (debug-signed, sideload only).

            Download `element-td.apk`, open it on your phone and allow
            installation from unknown sources. Requires a 64-bit device
            (any phone from roughly 2017 onward).

            Prefer not to install anything? Play it in the browser:
            https://acansahin.github.io/godot-tower-defense-/
